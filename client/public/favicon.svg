<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background Apple blue gradient -->
    <linearGradient id="appleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A84FF" />
      <stop offset="100%" stop-color="#0056B3" />
    </linearGradient>
    <!-- Accent orange/gold gradient for Atlas Needle -->
    <linearGradient id="needleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9F0A" />
      <stop offset="100%" stop-color="#FF453A" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Apple squircle rounded background -->
  <rect width="512" height="512" rx="112" fill="url(#appleGrad)" />

  <!-- Subtle grid layout to resemble an atlas/map/globe -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="rgba(255, 255, 255, 0.08)" stroke-width="4" />
  <circle cx="256" cy="256" r="120" fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="4" />
  <path d="M76 256 C 76 150, 436 150, 436 256" fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="4" />
  <path d="M76 256 C 76 362, 436 362, 436 256" fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="4" stroke-dasharray="8,8" />
  <line x1="256" y1="76" x2="256" y2="436" stroke="rgba(255, 255, 255, 0.08)" stroke-width="4" />
  <line x1="76" y1="256" x2="436" y2="256" stroke="rgba(255, 255, 255, 0.08)" stroke-width="4" />

  <!-- The Graduation Cap combined with Compass Arrow/Needle -->
  <g filter="url(#shadow)">
    <!-- Cap Diamond (White) -->
    <path d="M256 140 L390 200 L256 260 L122 200 Z" fill="#FFFFFF" />
    
    <!-- Cap under-structure (White/Semi-transparent) -->
    <path d="M180 230 V280 C180 310, 332 310, 332 280 V230" fill="none" stroke="#FFFFFF" stroke-width="16" stroke-linecap="round" />
    
    <!-- Compass needle in the center pointing North-East (Career path guidance) -->
    <!-- Pivot / Center point of needle -->
    <circle cx="256" cy="200" r="16" fill="url(#needleGrad)" />
    <!-- North Point (Red/Orange) -->
    <path d="M256 200 L250 200 L280 145 Z" fill="url(#needleGrad)" />
    <!-- South Point (Silver/White) -->
    <path d="M256 200 L262 200 L232 255 Z" fill="#D2D2D7" />

    <!-- Tassel -->
    <path d="M390 200 V270 C390 285, 370 295, 370 295" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" />
    <circle cx="370" cy="295" r="10" fill="#FFFFFF" />
  </g>
</svg>